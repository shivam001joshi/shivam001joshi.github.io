    #root {

    }

    /* custom cursor */
    #cursor {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference
    }

    #cursor-dot {
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, width 0.25s, height 0.25s
    }

    #cursor-ring {
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      position: absolute;
      transform: translate(-50%, -50%);
      transition: transform 0.18s var(--ease-out), width 0.3s, height 0.3s, border-color 0.3s
    }

    body.cursor-hover #cursor-dot {
      width: 14px;
      height: 14px
    }

    body.cursor-hover #cursor-ring {
      width: 56px;
      height: 56px;
      border-color: rgba(255, 255, 255, 0.9)
    }

    body.cursor-click #cursor-dot {
      transform: translate(-50%, -50%) scale(0.6)
    }

    /* grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");

    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--cream2)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gold2);
      border-radius: 2px
    }

    /* selection */
    ::selection {
      background: var(--gold2);
      color: #fff
    }

    /* links */
    a {
      color: inherit;
      text-decoration: none
    }

    button {
      font-family: var(--ff-body);
      cursor: none
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .hero-grid {

    // Populate ratings, reviews and semantic tags for local catalog on startup
    LOCAL_CATALOG.forEach(p => {
      let hash = 0;
      const str = p.name + p.brand;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      p.rating = (4.1 + Math.abs(hash % 8) * 0.1).toFixed(1);
      p.reviews = 35 + Math.abs(hash % 450);

      // Dynamic High-Fidelity Tag Generation for Semantic pre-filtering
      const tags = new Set();
      const textFields = [p.name, p.desc];
      textFields.forEach(txt => {
        if (txt) {
          const words = txt.toLowerCase().match(/\b[a-zA-Z0-9]{3,}\b/g) || [];
          words.forEach(w => tags.add(w));
        }
      });
      tags.add(p.brand.toLowerCase());
      tags.add(p.color.toLowerCase());
      tags.add(p.gender.toLowerCase());
      tags.add(p.category.toLowerCase());
      if (p.occasion) {
        p.occasion.forEach(occ => tags.add(occ.toLowerCase()));
      }

      // Inject rich semantic synonym mapping dynamically on startup
      const hasAny = (list) => list.some(k => tags.has(k));

      if (hasAny(["diwali", "wedding", "festive", "ethnic", "kurta", "sherwani", "anarkali", "saree"])) {
        ["traditional", "festive", "puja", "celebration", "indian", "ethnic", "wedding", "diwali", "fusion"].forEach(t => tags.add(t));
      }
      if (hasAny(["dress", "midi", "wrap", "party", "date", "cowl", "blouse"])) {
        ["freshers", "college", "prom", "nightout", "date", "brunch", "summer", "western", "clubbing", "cocktail", "party", "celebration"].forEach(t => tags.add(t));
      }
      if (hasAny(["shoes", "sneakers", "running", "gym"])) {
        ["footwear", "gym", "exercise", "workout", "sports", "sneakers", "streetwear", "athletic", "comfort", "daily", "casual"].forEach(t => tags.add(t));
      }
      if (hasAny(["linen", "summer", "resort", "beach"])) {
        ["vacation", "beach", "holiday", "breeze", "lightweight", "chill", "casual", "brunch"].forEach(t => tags.add(t));
      }
      if (hasAny(["jacket", "fleece", "outerwear", "winter", "coat"])) {
        ["winter", "travel", "warm", "outdoor", "chill", "layer", "cold", "formal"].forEach(t => tags.add(t));
      }

      p.tags = Array.from(tags);
    });

    function isOutOfScopeQuery(queryText) {
      const norm = queryText.toLowerCase().trim();
      const outOfScopeKeywords = [
        "phone", "iphone", "samsung", "pixel", "oneplus", "smartphone", "mobile",
        "laptop", "macbook", "computer", "desktop", "monitor", "keyboard", "mouse",
        "dyson", "airwrap", "styler", "hair dryer", "straightener", "skincare", "beauty",
        "lipstick", "serum", "shampoo", "conditioner", "cream", "lotion", "foundation",
        "book", "novel", "stationery", "notebook", "furniture", "chair", "table", "bed",
        "sofa", "couch", "desk", "tv", "television", "fridge", "refrigerator", "cooker",
        "blender", "microwave", "oven", "gadget", "headphones", "earbuds", "speaker", "audio"
      ];
      for (const kw of outOfScopeKeywords) {
        const regex = new RegExp('\\\b' + kw + '\\\b', 'i');
        if (regex.test(norm)) return true;
      }
      return false;
    }

    function getPopularRecommendations(maxPrice) {
      const recs = LOCAL_CATALOG.filter(p => p.price <= maxPrice);
      recs.sort((a, b) => parseFloat(b.rating) - parseFloat(a.rating));
      return recs.slice(0, 6);
    }

    function searchLocalCatalog(queryText, maxPrice) {
      if (isOutOfScopeQuery(queryText)) {
        return [];
      }

      const norm = queryText.toLowerCase().trim();
      const queryWords = norm.match(/\b[a-zA-Z0-9]{3,}\b/g) || [];

      // 1. Parse budget constraint
      const reqBudget = maxPrice;

      // Extract strict brand with boundary bounds
      const brandsList = ["zara", "nike", "decathlon", "manyavar", "biba", "fabindia", "w", "adidas", "h&m", "hm", "levi", "mango"];
      let reqBrand = "";
      for (const b of brandsList) {
        const regex = new RegExp('\\b' + b + '\\b', 'i');
        if (regex.test(norm)) {
          reqBrand = b;
          break;
        }
      }

      // Extract strict gender constraints
      let reqGender = "";

          if (p.price > limit) continue;

    function VoicePilotPage({ theme, onBack }) {

      const handleTaxLanguageChange = (lang) => {

          ? "नमस्ते! आयकर विभाग सहायता केंद्र में आपका स्वागत है। मैं आयकर रिटर्न (ITR) फाइलिंग या कर संबंधी प्रश्नों में आपकी क्या सहायता कर सकता हूँ?"
          : "Hello! Welcome to the Income Tax Department Help Center. How can I assist you with your Income Tax Return (ITR) filing or tax-related queries today?";
        setMessages([{ id: 'g1-' + Date.now(), sender: 'bot', text: greetingText }]);

        addLog(`Switched Tax Assistant language to ${lang === 'hi' ? 'Hindi' : 'English'}.`);

      // Premium feature states: Collapsible Activity Logs and Playing Speech indicators

      const [logsExpanded, setLogsExpanded] = useState(false);

      const AGENT_PROMPTS = {
        IncomeTaxDepartmentBot: "You are a helpful, empathetic, and secure customer support assistant for the Income Tax Department of India.\n\nYour role is to assist users with Income Tax Return (ITR) filing and related queries using only verified government-published information.\n\nTone: Be calm, kind, and natural. Avoid robotic replies.\n\nLanguage Rules: Respond strictly and exclusively in fluent Devanagari Hindi. Do not use English or Roman script. Even if the user asks a query in English, always reply in respectful Devanagari Hindi.\n\nPrivacy: Never ask for Aadhaar, PAN, passwords, OTPs, or bank details. If shared, say: \"आपकी सुरक्षा के लिए, कृपया अपनी व्यक्तिगत जानकारी यहाँ साझा न करें।\"\n\nStep-by-Step: Break tasks into single steps. Wait for confirmation. Summarize at the end.\n\nKeep responses concise (2-3 sentences max for voice).",

        MentalHealthCounselor: "You are a compassionate, licensed mental health counselor.\nYour role: 1) Greet warmly 2) Validate feelings 3) Ask open-ended questions 4) Offer coping strategies 5) Watch for self-harm mentions and provide crisis hotline info 6) Maintain empathetic tone 7) Close with a gentle check-in.\n\nKeep responses concise and warm (2-3 sentences for voice).",

        PatientAppointmentBooking: "You are a friendly medical appointment booking assistant.\nHelp users: 1) Ask full name 2) Ask provider type 3) Ask preferred dates/times 4) Confirm contact details 5) Present available slots 6) Confirm booking 7) Give prep instructions 8) Offer SMS/email confirmation.\n\nKeep responses concise (2-3 sentences for voice)."
      };

      // White-Labeled Logging Helper
      const addLog = (msg) => {
        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        // Scrub third-party references
        const scrubbed = msg
          .replace(/Deepgram/gi, 'Speech-to-Text engine')

          .catch(() => {

              { id: 'MentalHealthCounselor', title: 'Empathic Counselor', icon: '🧠', preview: 'Supportive mental health space.', greeting: 'Hello, I am here for you. How can I help?' },
              { id: 'PatientAppointmentBooking', title: 'Medical Booking', icon: '🏥', preview: 'Appointment scheduling assistant.', greeting: 'Hello! How can I help you book an appointment?' }
            ];
            setAgents(fallback);
            setMessages([{ id: 'g1', sender: 'bot', text: fallback[0].greeting }]);
            addLog(`Offline: Failed to connect to ${serverType}. Loaded localized edge fallback system.`);
          });

        // Initialize Web Speech API's SpeechRecognition
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

          rec.interimResults = true;

          rec.lang = (activeAgent === 'IncomeTaxDepartmentBot' && taxLanguage === 'hi') ? 'hi-IN' : 'en-US';

          rec.onresult = (e) => {
            let interimTranscript = '';
            let finalTranscript = '';
            for (let i = e.resultIndex; i < e.results.length; ++i) {
              if (e.results[i].isFinal) {
                finalTranscript += e.results[i][0].transcript;
              } else {
                interimTranscript += e.results[i][0].transcript;
              }
            }
            const currentText = (finalTranscript + interimTranscript).trim();
            if (currentText) {
              setInputText(currentText);
              currentTranscriptRef.current = currentText;
              if (addLogRef.current) addLogRef.current(`[Speech recognition] Hearing: "${currentText}"`);
            }
          };

          rec.onerror = (e) => {
            if (addLogRef.current) addLogRef.current(`[Speech recognition] Engine error: ${e.error}`);
            setStatusText('Idle');
            setRecording(false);
          };

          rec.onend = () => {
            setRecording(false);
          };

          recognitionRef.current = rec;
          addLog(`Browser Speech Recognition initialized. (Target language: ${rec.lang === 'hi-IN' ? 'Hindi (hi-IN)' : 'English (en-US)'})`);
        } else {
          addLog('Local speech recognition not supported in this browser. Activating direct audio file recorder.');

        return () => {
          window.removeEventListener('resize', handleResize);

      // Keep refs updated to prevent stale functional state closures in listeners

      // --- Canvas oscilloscope (Thin, modern, bottom-anchored) ---
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let phase = 0;
        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const w = canvas.width, h = canvas.height, midY = h / 2;
          phase += 0.08;
          const isDark = theme === 'dark';
          let amp = 3, freq = 0.015, color = isDark ? 'rgba(212,168,67,0.3)' : 'rgba(184,130,31,0.2)', lw = 1, nw = 2;
          if (recording) { amp = 10; freq = 0.035; color = '#ff4b4b'; lw = 2; nw = 3; }
          else if (processing) { amp = 4; freq = 0.15; color = isDark ? 'rgba(212,168,67,0.8)' : 'rgba(184,130,31,0.7)'; lw = 1.2; nw = 4; }
          else if (statusText.includes('Speaking')) { amp = 8; freq = 0.02; color = isDark ? 'rgba(255,255,255,0.8)' : 'rgba(18,18,18,0.7)'; lw = 2; nw = 2; }
          for (let wi = 0; wi < nw; wi++) {
            ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = lw / (wi + 1);
            for (let x = 0; x < w; x++) {
              const fade = Math.sin((x / w) * Math.PI);
              const y = midY + Math.sin(x * freq + phase + wi * 12) * amp * fade;
              x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }

          }
