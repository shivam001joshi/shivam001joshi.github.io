      width: 14px;
      height: 14px
    }

      width: 56px;
      height: 56px;
      border-color: rgba(255, 255, 255, 0.9)

    function useMousePosition() {
      const pos = useRef({ x: 0, y: 0 });
      const ring = useRef({ x: 0, y: 0 });
      const raf = useRef(null);
      useEffect(() => {
        const dot = document.getElementById('cursor-dot');
        const ringEl = document.getElementById('cursor-ring');
        const onMove = e => {
          pos.current = { x: e.clientX, y: e.clientY };
          if (dot) { dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px'; }
          if (!raf.current) {
            raf.current = requestAnimationFrame(() => {
              ring.current.x += (pos.current.x - ring.current.x) * 0.12;
              ring.current.y += (pos.current.y - ring.current.y) * 0.12;
              if (ringEl) { ringEl.style.left = ring.current.x + 'px'; ringEl.style.top = ring.current.y + 'px'; }
              raf.current = null;
            });
          }
        };
        const animate = () => {
          ring.current.x += (pos.current.x - ring.current.x) * 0.12;
          ring.current.y += (pos.current.y - ring.current.y) * 0.12;
          if (ringEl) { ringEl.style.left = ring.current.x + 'px'; ringEl.style.top = ring.current.y + 'px'; }
          requestAnimationFrame(animate);
        };
        animate();
        window.addEventListener('mousemove', onMove, { passive: true });
        window.addEventListener('mousedown', () => document.body.classList.add('cursor-click'));
        window.addEventListener('mouseup', () => document.body.classList.remove('cursor-click'));
        const isMob = /iPhone|iPad|Android/i.test(navigator.userAgent);
        if (isMob) { document.body.classList.add('no-custom-cursor'); document.getElementById('cursor').style.display = 'none'; }
        const hoverEls = () => {
          document.querySelectorAll('a,button,[data-hover]').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
          });
        };
        hoverEls();
        const obs = new MutationObserver(hoverEls);
        obs.observe(document.body, { childList: true, subtree: true });
        return () => { window.removeEventListener('mousemove', onMove); obs.disconnect(); }
      }, []);
    }

    function useInView(ref, threshold = 0.15) {
      const [inView, setInView] = useState(false);
      useEffect(() => {
        if (!ref.current) return;
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setInView(true) }, { threshold });
        obs.observe(ref.current);
        return () => obs.disconnect();
      }, [ref, threshold]);
      return inView;
    }

    function useCountUp(target, inView, duration = 1400) {
      const [val, setVal] = useState(0);
      useEffect(() => {
        if (!inView) return;
        const isNum = !isNaN(parseFloat(target));
        if (!isNum) return;
        const n = parseFloat(target);
        const start = performance.now();
        const tick = now => {
          const t = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          setVal(Math.round(ease * n * 10) / 10);
          if (t < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }, [inView, target]);
      return val;
    }

    function TiltCard({ children, className = '', style = {}, onClick }) {
      const ref = useRef(null);

        const r = ref.current.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width - 0.5;
        const y = (e.clientY - r.top) / r.height - 0.5;
        ref.current.style.transform = `perspective(800px) rotateY(${x * 10}deg) rotateX(${-y * 10}deg) translateY(-6px)`;
      };
      const handleLeave = () => {
        if (ref.current) ref.current.style.transform = 'perspective(800px) rotateY(0deg) rotateX(0deg) translateY(0)';
      };
      return React.createElement('div', {
        ref, className,
        style: { transition: 'transform 0.4s cubic-bezier(0.22,1,0.36,1)', willChange: 'transform', ...style },
        onMouseMove: handleMove, onMouseLeave: handleLeave, onClick

    }

    function searchLocalCatalog(queryText, maxPrice) {
      const norm = queryText.toLowerCase().trim();

      // Strict category filters
      let reqCategory = "";
      if (norm.includes("dress") || norm.includes("midi") || norm.includes("skirt")) reqCategory = "Dresses";
      else if (norm.includes("kurta") || norm.includes("sherwani") || norm.includes("suit") || norm.includes("anarkali") || norm.includes("ethnic") || norm.includes("saree") || norm.includes("diwali") || norm.includes("festive") || norm.includes("maroon") || norm.includes("yellow")) reqCategory = "Ethnic Wear";
      else if (norm.includes("shoe") || norm.includes("sneaker") || norm.includes("pegasus") || norm.includes("running") || norm.includes("nike")) reqCategory = "Shoes";
      else if (norm.includes("tee") || norm.includes("t-shirt") || norm.includes("shirt") || norm.includes("top")) reqCategory = "Tops";
      else if (norm.includes("jogger") || norm.includes("pant") || norm.includes("bottom")) reqCategory = "Bottoms";
      else if (norm.includes("fleece") || norm.includes("jacket") || norm.includes("outerwear")) reqCategory = "Outerwear";

      // Strict color keyword filters
      const colorsList = ["black", "white", "red", "blue", "yellow", "green", "maroon", "gold", "silver", "pink", "navy", "grey", "mustard", "cream"];
      let reqColor = "";
      for (const c of colorsList) {
        if (norm.includes(c)) {
          reqColor = c;
          break;
        }
      }

      const scored = [];
      for (const p of LOCAL_CATALOG) {
        if (p.price > maxPrice) continue;

        // Strict color filtering
        if (reqColor && !p.color.toLowerCase().includes(reqColor)) continue;

        // Strict category filtering
        if (reqCategory && reqCategory !== "Ethnic Wear" && reqCategory !== "Dresses" && p.category !== reqCategory) continue;
        if (reqCategory && (reqCategory === "Ethnic Wear" || reqCategory === "Dresses") && p.category !== "Ethnic Wear" && p.category !== "Dresses") continue;

        let score = 0;
        const searchable = `${p.name} ${p.desc} ${p.category} ${p.brand} ${p.color}`.toLowerCase();

        // Word match scoring
        const words = norm.split(/\s+/);
        for (const w of words) {
          if (w.length >= 3 && searchable.includes(w)) {
            score += 2;
          }
        }

        // Occasions match weight
        if (p.occasion) {
          for (const occ of p.occasion) {
            if (norm.includes(occ)) {
              score += 5;
            }
          }
        }

        if (score > 0) {
          scored.push({ score, p });
        }
      }

      scored.sort((a, b) => b.score - a.score);
      const topPicks = scored.map(x => x.p).slice(0, 8);

      // Complete fallback in case score filters returned absolutely nothing
      if (topPicks.length === 0) {
        if (reqCategory) {
          return LOCAL_CATALOG.filter(p => p.category === reqCategory && p.price <= maxPrice).slice(0, 8);
        }
        return LOCAL_CATALOG.filter(p => p.price <= maxPrice).slice(0, 8);
      }
      return topPicks;
    }

      const [logsExpanded, setLogsExpanded] = useState(false);

      const audioChunksRef = useRef([]);

      const AGENT_PROMPTS = {
        IncomeTaxDepartmentBot: "You are a helpful, empathetic, and secure customer support assistant for the Income Tax Department of India.\n\nYour role is to assist users with Income Tax Return (ITR) filing and related queries using only verified government-published information.\n\nTone: Be calm, kind, and natural. Avoid robotic replies.\n\nLanguage Rules: Respond strictly and exclusively in fluent Devanagari Hindi. Do not use English or Roman script. Even if the user asks a query in English, always reply in respectful Devanagari Hindi.\n\nPrivacy: Never ask for Aadhaar, PAN, passwords, OTPs, or bank details. If shared, say: \"आपकी सुरक्षा के लिए, कृपया अपनी व्यक्तिगत जानकारी यहाँ साझा न करें।\"\n\nStep-by-Step: Break tasks into single steps. Wait for confirmation. Summarize at the end.\n\nKeep responses concise (2-3 sentences max for voice).",

        MentalHealthCounselor: "You are a compassionate, licensed mental health counselor.\nYour role: 1) Greet warmly 2) Validate feelings 3) Ask open-ended questions 4) Offer coping strategies 5) Watch for self-harm mentions and provide crisis hotline info 6) Maintain empathetic tone 7) Close with a gentle check-in.\n\nKeep responses concise and warm (2-3 sentences for voice).",

        PatientAppointmentBooking: "You are a friendly medical appointment booking assistant.\nHelp users: 1) Ask full name 2) Ask provider type 3) Ask preferred dates/times 4) Confirm contact details 5) Present available slots 6) Confirm booking 7) Give prep instructions 8) Offer SMS/email confirmation.\n\nKeep responses concise (2-3 sentences for voice)."
      };

      // White-Labeled Logging Helper
      const addLog = (msg) => {
        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        // Scrub third-party references
        const scrubbed = msg
          .replace(/Deepgram/gi, 'Speech-to-Text engine')
          .replace(/ElevenLabs/gi, 'Voice synthesis engine')
          .replace(/OpenAI|GPT-4o-mini/gi, 'Conversational AI layer')
          .replace(/Perplexity|Sonar/gi, 'Search engine core');
        setLogs(prev => [`[${timeStr}] ${scrubbed}`, ...prev].slice(0, 50));
      };

      // --- Mount: fetch agents, init speech recognition ---
      useEffect(() => {
        const handleResize = () => setWidth(window.innerWidth);
        window.addEventListener('resize', handleResize);

        const backendHost = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' || window.location.protocol === 'file:')
          ? 'http://127.0.0.1:5000'
          : 'https://mestocy.pythonanywhere.com';

        addLog('Connecting to backend services...');
        fetch(`${backendHost}/api/voice-agents`)
          .then(r => r.json())
          .then(data => {
            setAgents(data);
            const def = data.find(a => a.id === activeAgent);
            if (def) setMessages([{ id: 'g1', sender: 'bot', text: def.greeting }]);
            addLog('Connected to backend services successfully. Custom voices ready.');
          })
          .catch(() => {
            setUseEdgeStt(true);
            const fallback = [
              { id: 'IncomeTaxDepartmentBot', title: 'आयकर सहायता', icon: '🇮🇳', preview: 'आयकर रिटर्न (ITR) फाइलिंग और कर संबंधी सहायता।', greeting: 'नमस्ते! आयकर विभाग सहायता केंद्र में आपका स्वागत है। मैं आयकर रिटर्न (ITR) फाइलिंग या कर संबंधी प्रश्नों में आपकी क्या सहायता कर सकता हूँ?' },
              { id: 'MentalHealthCounselor', title: 'Empathic Counselor', icon: '🧠', preview: 'Supportive mental health space.', greeting: 'Hello, I am here for you. How can I help?' },
              { id: 'PatientAppointmentBooking', title: 'Medical Booking', icon: '🏥', preview: 'Appointment scheduling assistant.', greeting: 'Hello! How can I help you book an appointment?' }
            ];
            setAgents(fallback);
            setMessages([{ id: 'g1', sender: 'bot', text: fallback[0].greeting }]);
            addLog('Backend offline. Loaded localized edge fallback system.');
          });

        // Initialize Web Speech API's SpeechRecognition
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SR) {
          const rec = new SR();
          rec.continuous = true;
          rec.interimResults = true;
          // Set language dynamically: Hindi for tax department bot, English for other agents
          rec.lang = activeAgent === 'IncomeTaxDepartmentBot' ? 'hi-IN' : 'en-US';

          rec.onresult = (e) => {
            let interimTranscript = '';
            let finalTranscript = '';
            for (let i = e.resultIndex; i < e.results.length; ++i) {
              if (e.results[i].isFinal) {
                finalTranscript += e.results[i][0].transcript;
              } else {
                interimTranscript += e.results[i][0].transcript;
              }
            }
            const currentText = (finalTranscript + interimTranscript).trim();
            if (currentText) {
              setInputText(currentText);
              if (addLogRef.current) addLogRef.current(`[Speech recognition] Hearing: "${currentText}"`);
            }
          };

          rec.onerror = (e) => {
            if (addLogRef.current) addLogRef.current(`[Speech recognition] Engine error: ${e.error}`);
            setStatusText('Idle');
            setRecording(false);
          };

          rec.onend = () => {
            setRecording(false);
          };

          recognitionRef.current = rec;
          addLog(`Browser Speech Recognition initialized. (Target language: ${rec.lang === 'hi-IN' ? 'Hindi hi-IN' : 'English en-US'})`);
        } else {
          addLog('Local speech recognition not supported in this browser. Activating direct audio file recorder.');
        }

        return () => {
          window.removeEventListener('resize', handleResize);
          audioRef.current.pause();
          window.speechSynthesis.cancel();
          if (recognitionRef.current) recognitionRef.current.abort();
        };
      }, []);

      // Keep refs updated to prevent stale functional state closures in listeners
      useEffect(() => {
        processInputRef.current = processInput;

                  type: 'text',
                  value: inputText,
                  onChange: e => setInputText(e.target.value),
                  placeholder: activeAgent === 'IncomeTaxDepartmentBot' ? (recording ? 'सुन रहा हूँ... कृपया स्पष्ट बोलें।' : 'या यहाँ संदेश टाइप करें...') : (recording ? 'Listening... speak clearly now.' : 'Or type a message...'),
                  style: {
                    flex: 1,
                    background: 'var(--white)',
                    border: '1px solid var(--border)',
                    borderRadius: 20,
                    padding: '8px 16px',
                    color: 'var(--ink)',
                    fontSize: 12,
                    outline: 'none',
                    fontFamily: "'Outfit', sans-serif",
                    transition: 'border-color 0.2s'
                  },
                  onFocus: e => e.currentTarget.style.borderColor = accentGold,
                  onBlur: e => e.currentTarget.style.borderColor = 'var(--border)'
                })
              )
            ),

            // White labeled Telemetry benchmarks
            React.createElement('div', {
              style: {
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center',
                borderTop: '1px solid var(--border)',
                paddingTop: 6,
                fontSize: 8.5,
                fontFamily: "'JetBrains Mono', monospace",
                color: 'var(--ink3)'
              }
            },
              React.createElement('div', { style: { display: 'flex', gap: 12 } },
                React.createElement('span', null, `STT: ${stats.stt ? `${stats.stt.toFixed(0)}ms` : '--'}`),
                React.createElement('span', null, `LLM: ${stats.gpt ? `${stats.gpt.toFixed(0)}ms` : '--'}`),
                React.createElement('span', null, `TTS: ${stats.tts ? `${stats.tts.toFixed(0)}ms` : '--'}`),
                React.createElement('span', null, `AUD_OUT: ${stats.audio_out ? `${(stats.audio_out / 1024).toFixed(1)}kB` : '--'}`)
              ),
              summary && React.createElement('span', {
                style: { color: accentGold, cursor: 'pointer' },
                title: summary,
                onClick: () => {
                  setMessages(prev => [...prev, {
                    id: 'sys-' + Date.now(),
                    sender: 'system',
                    text: activeAgent === 'IncomeTaxDepartmentBot' ? `📝 सत्र विवरण: ${summary.replace(/<br\/>/g, ' ')}` : `📝 SESSION NOTE SUMMARY: ${summary.replace(/<br\/>/g, ' ')}`
                  }]);
                }
              }, activeAgent === 'IncomeTaxDepartmentBot' ? 'सत्र विवरण देखें 📝' : 'View Session Notes 📝')
            )
          )
        )
      );
    }



    function ContactPage() {
      return React.createElement('div', { style: { paddingTop: 80, minHeight: '80vh' } },
        React.createElement(ContactSection, null)
      );
    }

    // ─── FOOTER ──────────────────────────────────────────────────────────────────

    function Footer({ setPage }) {
      return React.createElement('footer', { style: { borderTop: '1px solid var(--border)', padding: '28px 5vw', background: 'var(--cream2)' } },
        React.createElement('div', { style: { maxWidth: 1080, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 } },
          React.createElement('div', { style: { fontSize: 12, color: 'var(--ink3)' } }, '© 2026 Shivam Joshi · Senior Product Manager'),
          React.createElement('div', { style: { display: 'flex', gap: 22 } },
            ['Email', 'LinkedIn', 'Case Studies'].map(l => React.createElement('button', {
              key: l,
              onClick: () => {
                if (l === 'Email') window.location.href = 'mailto:shivam001joshi@gmail.com';
                else if (l === 'LinkedIn') window.open('https://www.linkedin.com/in/ishivamjoshi', '_blank');
                else { setPage('case-studies'); window.scrollTo({ top: 0, behavior: 'smooth' }); }
              },
              style: { fontSize: 12, color: 'var(--ink3)', background: 'none', border: 'none', cursor: 'none', transition: 'color 0.2s', fontFamily: "'Outfit',sans-serif" },
              onMouseEnter: e => e.currentTarget.style.color = 'var(--gold)',
              onMouseLeave: e => e.currentTarget.style.color = 'var(--ink3)',
            }, l))
          )
        )
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────────────────

    function App() {
      const [page, setPage] = useState('home');
      const [caseId, setCaseId] = useState(null);
      const [theme, setTheme] = useState('light');
      useMousePosition();

      useEffect(() => {
        if (theme === 'dark') {
          document.body.classList.add('dark-theme');
        } else {
          document.body.classList.remove('dark-theme');
        }
      }, [theme]);

      // Page transition state
      const [transitioning, setTransitioning] = useState(false);
      const prevPage = useRef(page);

      const navigate = (p) => {
        if (p === page) return;
        setTransitioning(true);
        setTimeout(() => { setPage(p); prevPage.current = p; setTransitioning(false); window.scrollTo({ top: 0, behavior: 'instant' }); }, 200);
      };

      const pageStyle = {
        opacity: transitioning ? 0 : 1,
        transform: transitioning ? 'translateY(10px)' : 'translateY(0)',
        transition: 'opacity 0.2s,transform 0.2s',
        minHeight: '100vh',
      };

      return React.createElement('div', null,
        React.createElement(Nav, { page, setPage: navigate, theme, setTheme }),
        React.createElement('div', { style: pageStyle },
          page === 'home' && React.createElement(HomePage, { setPage: navigate, setCaseId }),
          page === 'playground' && React.createElement(AiPlaygroundPage, { setPage: navigate }),
          page === 'aidiscovery' && React.createElement(AiDiscoveryPage, { onBack: () => navigate('playground') }),
          page === 'strategy-simulator' && React.createElement(StrategySimulatorPage, { onBack: () => navigate('playground') }),
          page === 'voice-pilot' && React.createElement(VoicePilotPage, { onBack: () => navigate('playground') }),
          page === 'case-studies' && React.createElement(CaseStudiesPage, { initialCaseId: caseId, setInitialCaseId: setCaseId }),
          page === 'contact' && React.createElement(ContactPage, null),
        ),
        React.createElement(Footer, { setPage: navigate })
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>

</html>
